name: CREX e-Stat データ取得

on:
  schedule:
    - cron: '0 18 1,15 * *'
  workflow_dispatch:
    inputs:
      target:
        description: '取得対象（all / ソースID / カンマ区切りで複数指定）'
        required: true
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install requests pandas

      - name: データ取得
        env:
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
        run: |
          TARGET="${{ github.event.inputs.target || 'all' }}"
          if [ "$TARGET" = "all" ]; then
            python scripts/fetch_all.py
          else
            ARGS=$(echo "$TARGET" | tr ',' ' ')
            python scripts/fetch_all.py $ARGS
          fi
          
　　　- name: マクロ指標直接取得
        env:
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
        run: python scripts/fetch_macro_direct.py
        
      - name: データ加工（raw→JSON）
        run: python scripts/phase3_process.py
        
      - name: Googleスプレッドシート用集約
        run: python scripts/aggregate_for_gsheet.py

      - name: データをコミット
        run: |
          git config user.name "CREX Data Bot"
          git config user.email "bot@crexgroup.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 データ更新: $(date '+%Y-%m-%d %H:%M')"
          git push
